                        <input type="text" name="name" id="input-box" placeholder="What needs to be done?">

                    <ul class="list" id="list">

                </div>
            </form> 
            
            </div>

            <div class="card stats-card">

            <!-- </div>
            <div class="todo-stats"> -->
                <h2>Dashboard</h2>
                <span class="dateToday"></span>
                <div class="stat-item">
                    Total Tasks: <span class="total-tasks">0</span> 
                </div>
               
                <div class="stat-item">
                    In progress: <span class="remaining-tasks">0</span>

                <div class="stat-item">
                    Completed: <span class="completed-tasks" class="good">0</span>
